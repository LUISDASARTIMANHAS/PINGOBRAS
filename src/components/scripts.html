<!--
  scripts.html — Centraliza o carregamento de Bootstrap JS, funções globais
  e efeitos de página (scroll suave, animações). Deve ser o último componente
  a executar, pois pode depender do restante do DOM já estar montado.
-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
<script src="./src/js/functions.js" defer></script>
<script src="https://luisdasartimanhas.github.io/PINGOBRAS/src/js/functions.js" defer></script>
<script src="https://luisdasartimanhas.github.io/PINGOBRAS/src/js/ip-info.js" defer></script>

<script>
  /**
   * Ativa scroll suave para todos os links âncora internos (href="#...")
   * presentes na página no momento em que os componentes terminam de carregar.
   *
   * @return {void}
   */
  function enableSmoothScroll() {
    document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
      anchor.addEventListener("click", (event) => {
        const href = anchor.getAttribute("href");
        if (href === "#") return;

        const targetEl = document.querySelector(href);
        if (!targetEl) return;

        event.preventDefault();
        targetEl.scrollIntoView({ behavior: "smooth" });
      });
    });
  }

  /**
   * Revela elementos com a classe "fade-in" usando IntersectionObserver,
   * evitando custo de scroll listeners manuais.
   *
   * @return {void}
   */
  function enableFadeInOnScroll() {
    const targets = document.querySelectorAll(".fade-in");
    if (!targets.length || !("IntersectionObserver" in window)) return;

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("animate__animated", "animate__fadeInUp");
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.15 }
    );

    targets.forEach((target) => observer.observe(target));
  }

  enableSmoothScroll();
  enableFadeInOnScroll();
</script>
