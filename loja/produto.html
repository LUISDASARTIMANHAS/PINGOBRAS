<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Identidade visual Pingobras -->
    <link rel="stylesheet" href="../src/css/template.css">
    <link rel="stylesheet" href="./loja.css">
</head>
<body>

    <main class="py-5">
        <div class="container" id="product-main">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="../">Home</a></li>
                    <li class="breadcrumb-item"><a href="../loja">Loja</a></li>
                    <li class="breadcrumb-item" id="breadcrumb-category">Categoria</li>
                    <li class="breadcrumb-item active" aria-current="page">Detalhes</li>
                </ol>
            </nav>

            <div class="row g-5">
                <!-- Galeria -->
                <div class="col-lg-5">
                    <div id="gallery-main" class="gallery-main mb-3" role="img" aria-label="Imagem do produto">
                        <i class="bi bi-image" aria-hidden="true"></i>
                    </div>
                    <div id="gallery-thumbs" class="d-flex gap-2 flex-wrap"></div>
                </div>

                <!-- Informações principais -->
                <div class="col-lg-7">
                    <p id="product-brand" class="text-uppercase small fw-semibold text-primary mb-1"></p>
                    <h1 id="product-title" class="h2 fw-bold mb-3"></h1>

                    <div class="d-flex align-items-center gap-3 mb-3">
                        <span id="product-condition" class="badge text-bg-secondary"></span>
                        <span id="product-stock" class="text-secondary small"></span>
                    </div>

                    <p id="product-short-description" class="mb-4"></p>

                    <div class="d-flex align-items-baseline gap-3 mb-4">
                        <span id="product-old-price" class="text-secondary text-decoration-line-through d-none"></span>
                        <span id="product-price" class="display-6 fw-bold"></span>
                    </div>

                    <a id="whatsapp-cta" class="btn btn-primary-gradient btn-lg w-100 w-md-auto" href="#" target="_blank" rel="noopener noreferrer">
                        <i class="bi bi-whatsapp" aria-hidden="true"></i> Comprar pelo WhatsApp
                    </a>

                    <hr class="my-4">

                    <dl class="row small">
                        <dt class="col-sm-4">Garantia</dt>
                        <dd class="col-sm-8" id="product-warranty"></dd>
                        <dt class="col-sm-4">Peso</dt>
                        <dd class="col-sm-8" id="product-weight"></dd>
                        <dt class="col-sm-4">Dimensões</dt>
                        <dd class="col-sm-8" id="product-dimensions"></dd>
                    </dl>
                </div>
            </div>

            <!-- Descrição completa -->
            <section class="py-5" aria-labelledby="descricao-titulo">
                <h2 id="descricao-titulo" class="h4 mb-3">Descrição</h2>
                <p id="product-long-description" class="text-secondary"></p>
            </section>

            <!-- Especificações técnicas -->
            <section class="py-4" aria-labelledby="specs-titulo">
                <h2 id="specs-titulo" class="h4 mb-3">Especificações técnicas</h2>
                <div class="table-responsive">
                    <table class="table specs-table">
                        <tbody id="specs-table-body"></tbody>
                    </table>
                </div>
            </section>

            <!-- Produtos relacionados -->
            <section class="py-5" aria-labelledby="relacionados-titulo">
                <h2 id="relacionados-titulo" class="h4 mb-4">Produtos relacionados</h2>
                <div id="related-grid" class="row g-4"></div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./loja-data.js"></script>
    <script src="./loja.js"></script>
    <script src="./produto.js"></script>
    <script src="./cookie-consent.js" defer></script>
    <script src="../src/js/site-config.js"></script>
    <script src="../src/js/component-loader.js"></script>
    <script src="../src/js/loader-components.js" defer></script>
</body>
</html>
